version: "3.9"

services:
  web:
    build: .
    container_name: gulumsemek-web
    ports:
      - "${APP_PORT}:8080"
    volumes:
      # wwwroot'u container içindeki uygulama wwwroot'una bağla; CSS/JS değişiklikleri için yeniden build gerekmesin
      - ./wwwroot:/app/wwwroot
    depends_on:
      - sadaka-minio
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    networks:
      - sadaka-net

  sadaka-minio:
    image: minio/minio:latest
    container_name: sadaka-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    networks:
      - sadaka-net

networks:
  sadaka-net:
    driver: bridge

volumes:
  minio-data: